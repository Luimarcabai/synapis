name: Sinapsis Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run dream cycle tests
        shell: bash
        run: bash tests/test-dream.sh

      - name: Run security tests
        shell: bash
        run: bash tests/test-security.sh

      - name: Run E2E dream tests
        shell: bash
        run: bash tests/test-e2e-dream.sh

      - name: Run gstack separation tests
        shell: bash
        run: bash tests/test-gstack-separation.sh

      - name: Run v4.3.3 hardening tests
        shell: bash
        run: bash tests/test-v433-hardening.sh

      - name: Run BOM / decay / Python detection regression tests
        shell: bash
        run: bash tests/test-bom-decay-python.sh

      - name: Run dashboard tests
        shell: bash
        run: bash tests/test-dashboard.sh

      - name: Run EOD gather tests
        shell: bash
        run: bash tests/test-eod-gather.sh

      - name: Run install/upgrade tests
        shell: bash
        run: bash tests/test-install-upgrade.sh

      - name: Run registry isolation tests
        shell: bash
        run: bash tests/test-registry-isolation.sh

      - name: Run v4.5 Opus 4.7 tests
        shell: bash
        run: bash tests/test-v45-opus47.sh

      - name: Run v4.6 Opus 4.8 tests
        shell: bash
        run: bash tests/test-v46-opus48.sh
